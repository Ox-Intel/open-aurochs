python:
    command: DISABLE_ENCRYPTION_FOR_TESTS=True python3 manage.py test --noinput
    watch_glob: "*.py"
    watch_dir: aurochs
flake:
    command: flake8
    watch_glob: "*.py"
    watch_dir: .
black:
    command: black --check aurochs manage.py
